name: CD

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source archive
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/financial-llm-analysis.tar.gz
        run: |
          tar -czf "$ARCHIVE_PATH" \
            .github \
            app \
            config \
            data \
            prompts \
            src \
            main.py \
            README.md \
            requirements.txt \
            .gitignore

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: financial-llm-analysis-${{ github.sha }}
          path: ${{ runner.temp }}/financial-llm-analysis.tar.gz
